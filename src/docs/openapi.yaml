openapi: "3.0.3"
info:
  title: AI Token Shop API
  description: "AI Token 电商平台 API - 提供用户认证、商品浏览、购物车、订单、支付、卡密管理等功能\n\n## 认证方式\n\n### 用户端 (NextAuth Session)\n- 使用 NextAuth JWT Session Cookie (`next-auth.session-token`)\n- 通过浏览器自动携带 Cookie，或手动在 Authorization Header 中传入 Bearer token\n\n### 管理后台 (Admin Session Cookie)\n- 管理员通过 `POST /api/admin/login` 获取 `admin_session` Cookie\n- 后续请求自动携带 Cookie\n\n## 通用响应格式\n\n### 成功响应 (使用 successResponse 封装)\n```json\n{\n  \"success\": true,\n  \"data\": { ... },\n  \"message\": \"可选消息\"\n}\n```\n\n### 错误响应 (使用 errorResponse 封装)\n```json\n{\n  \"success\": false,\n  \"error\": \"错误描述\",\n  \"message\": \"可选消息\"\n}\n```\n\n部分 Admin API 直接返回 `{ \"key\": value }` 格式。\n\n## 通用参数\n\n### 分页参数\n| 参数 | 类型 | 默认值 | 说明 |\n|------|------|--------|------|\n| page | integer | 1 | 页码 |\n| limit / pageSize | integer | 20 | 每页数量 |\n\n### 分页响应格式\n```json\n\"pagination\": {\n  \"page\": 1,\n  \"limit\": 20,\n  \"total\": 100,\n  \"totalPages\": 5\n}\n```"
  version: "1.0.0"
servers:
  - url: http://localhost:3000
    description: 开发服务器
paths:
  # ============================================================
  # Auth Routes
  # ============================================================
  /api/auth/register:
    post:
      summary: 用户注册
      description: 使用手机号或邮箱注册新用户
      tags: [用户认证]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [login, password]
              properties:
                login:
                  type: string
                  description: 手机号或邮箱
                  example: "13800138000"
                password:
                  type: string
                  minLength: 6
                  description: 密码（最少6位）
                  example: "password123"
                nickname:
                  type: string
                  description: 昵称（可选）
                  example: "张三"
      responses:
        "201":
          description: 注册成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "注册成功"
                  userId:
                    type: string
                    format: uuid
        "400":
          description: 参数错误或用户已存在

  /api/auth/signin:
    post:
      summary: 用户登录 (NextAuth)
      description: 使用 NextAuth Credentials Provider 登录，返回 session cookie
      tags: [用户认证]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [login, password]
              properties:
                login:
                  type: string
                  description: 手机号或邮箱
                password:
                  type: string
                  description: 密码
      responses:
        "200":
          description: 登录成功，返回 session cookie

  # ============================================================
  # User Profile Routes
  # ============================================================
  /api/user/profile:
    get:
      summary: 获取用户资料
      description: 获取当前登录用户的个人信息（需登录）
      tags: [用户中心]
      security:
        - NextAuthSession: []
      responses:
        "200":
          description: 用户资料
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    type: object
                    properties:
                      id:
                        type: string
                        format: uuid
                      nickname:
                        type: string
                        nullable: true
                      avatar:
                        type: string
                        nullable: true
                      phone:
                        type: string
                        nullable: true
                      email:
                        type: string
                        nullable: true
                      memberLevel:
                        type: integer
                      points:
                        type: integer
                      balance:
                        type: number
                        format: float
                      createdAt:
                        type: string
                        format: date-time
        "401":
          description: 未登录
    put:
      summary: 更新用户资料
      description: 更新当前登录用户的昵称或头像（需登录）
      tags: [用户中心]
      security:
        - NextAuthSession: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                nickname:
                  type: string
                  minLength: 1
                  maxLength: 50
                  description: 昵称
                avatar:
                  type: string
                  format: uri
                  description: 头像 URL
      responses:
        "200":
          description: 更新成功

  # ============================================================
  # Tokens (User Purchased)
  # ============================================================
  /api/tokens:
    get:
      summary: 获取用户已购买卡密列表
      description: 获取当前登录用户已购买的卡密列表（需登录）
      tags: [用户中心]
      security:
        - NextAuthSession: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: pageSize
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: 卡密列表
          content:
            application/json:
              schema:
                type: object
                properties:
                  tokens:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        keyValue:
                          type: string
                        keyType:
                          type: string
                        status:
                          type: string
                        product:
                          type: object
                          properties:
                            id:
                              type: string
                            name:
                              type: string
                            slug:
                              type: string
                            coverImage:
                              type: string
                        order:
                          type: object
                          properties:
                            orderNo:
                              type: string
                            paidAt:
                              type: string
                              format: date-time
                  pagination:
                    $ref: "#/components/schemas/Pagination"

  # ============================================================
  # Product Routes
  # ============================================================
  /api/products:
    get:
      summary: 商品列表
      description: 获取在售商品列表（公开接口）
      tags: [商品]
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: category
          in: query
          schema:
            type: string
          description: 分类ID，传 `all` 或不传表示全部
        - name: search
          in: query
          schema:
            type: string
          description: 搜索关键词（匹配名称和描述）
        - name: sort
          in: query
          schema:
            type: string
            enum: [default, sales, price_asc, price_desc]
            default: default
          description: "排序方式: default=最新, sales=销量, price_asc=价格升序, price_desc=价格降序"
        - name: tokenType
          in: query
          schema:
            type: string
            enum: [CHAT, EMBEDDING, IMAGE, VIDEO, API_KEY, ACCOUNT]
          description: Token类型筛选
      responses:
        "200":
          description: 商品列表
          content:
            application/json:
              schema:
                type: object
                properties:
                  products:
                    type: array
                    items:
                      $ref: "#/components/schemas/Product"
                  pagination:
                    $ref: "#/components/schemas/Pagination"
    post:
      summary: 创建商品
      description: 创建新商品（管理后台API）
      tags: [商品]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, originalPrice, sellingPrice]
              properties:
                name:
                  type: string
                slug:
                  type: string
                description:
                  type: string
                coverImage:
                  type: string
                images:
                  type: array
                  items:
                    type: string
                originalPrice:
                  type: number
                sellingPrice:
                  type: number
                costPrice:
                  type: number
                stock:
                  type: integer
                availableStock:
                  type: integer
                tokenType:
                  type: string
                  enum: [CHAT, EMBEDDING, IMAGE, VIDEO, API_KEY, ACCOUNT]
                tokenAmount:
                  type: integer
                validityDays:
                  type: integer
                status:
                  type: string
                  enum: [DRAFT, ONLINE, OFFLINE]
                  default: DRAFT
                categoryId:
                  type: string
      responses:
        "201":
          description: 创建成功

  /api/products/{id}:
    get:
      summary: 商品详情
      description: 获取单个商品详细信息
      tags: [商品]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: 商品详情
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/Product"
        "404":
          description: 商品不存在

  /api/products/{id}/reviews:
    get:
      summary: 商品评价列表
      description: 获取指定商品的所有评价
      tags: [商品]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: 评价列表
          content:
            application/json:
              schema:
                type: object
                properties:
                  reviews:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        rating:
                          type: integer
                        content:
                          type: string
                        user:
                          type: object
                          properties:
                            id:
                              type: string
                            nickname:
                              type: string
                            avatar:
                              type: string
                        createdAt:
                          type: string
                          format: date-time
                  total:
                    type: integer
                  avgRating:
                    type: number
                    format: float
                  distribution:
                    type: array
                    items:
                      type: integer
                    description: 评分分布 [1星, 2星, 3星, 4星, 5星]

  # ============================================================
  # Cart Routes
  # ============================================================
  /api/cart:
    get:
      summary: 获取购物车
      description: 获取当前用户的购物车内容（支持 session 和 userId 参数两种方式）
      tags: [购物车]
      parameters:
        - name: userId
          in: query
          schema:
            type: string
          description: 用户ID（Session不可用时回退）
      responses:
        "200":
          description: 购物车列表
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        productId:
                          type: string
                        quantity:
                          type: integer
                        product:
                          type: object
                          properties:
                            id:
                              type: string
                            name:
                              type: string
                            coverImage:
                              type: string
                            sellingPrice:
                              type: number
                            availableStock:
                              type: integer
    post:
      summary: 添加购物车
      description: 添加商品到购物车（已存在则增加数量）
      tags: [购物车]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [productId]
              properties:
                productId:
                  type: string
                  format: uuid
                quantity:
                  type: integer
                  default: 1
                userId:
                  type: string
                  description: Session不可用时回退
      responses:
        "200":
          description: 添加成功
        "400":
          description: 参数错误或库存不足
        "404":
          description: 商品不存在
    delete:
      summary: 删除购物车项
      description: 删除购物车中的某项商品
      tags: [购物车]
      parameters:
        - name: id
          in: query
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: 删除成功

  # ============================================================
  # Order Routes
  # ============================================================
  /api/orders:
    post:
      summary: 创建订单
      description: 创建新订单，支持优惠券
      tags: [订单]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [items, userId, totalAmount, payAmount]
              properties:
                userId:
                  type: string
                items:
                  type: array
                  minItems: 1
                  items:
                    type: object
                    required: [productId, productName, quantity, unitPrice, subtotal]
                    properties:
                      productId:
                        type: string
                      productName:
                        type: string
                      quantity:
                        type: integer
                      unitPrice:
                        type: number
                      subtotal:
                        type: number
                totalAmount:
                  type: number
                payAmount:
                  type: number
                discountAmount:
                  type: number
                  default: 0
                couponId:
                  type: string
                  description: 使用的优惠券ID
      responses:
        "201":
          description: 创建成功
    get:
      summary: 获取用户订单列表
      description: 获取指定用户的所有订单
      tags: [订单]
      parameters:
        - name: userId
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: 订单列表

  # ============================================================
  # Payment Routes
  # ============================================================
  /api/pay:
    get:
      summary: 支付入口信息
      description: 获取支付演示页面信息
      tags: [支付]
      responses:
        "200":
          description: 支付信息

  /api/pay/wechat:
    post:
      summary: 微信支付
      description: 发起微信支付（当前为 stub 模式，返回模拟支付URL）
      tags: [支付]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                orderId:
                  type: string
                  format: uuid
                orderNo:
                  type: string
              description: 订单ID和订单号二选一
      responses:
        "200":
          description: 支付参数
          content:
            application/json:
              schema:
                type: object
                properties:
                  paymentId:
                    type: string
                  payUrl:
                    type: string
                  orderNo:
                    type: string

  /api/pay/alipay:
    post:
      summary: 支付宝支付
      description: 发起支付宝支付（当前为 stub 模式，返回模拟支付URL）
      tags: [支付]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                orderId:
                  type: string
                  format: uuid
                orderNo:
                  type: string
      responses:
        "200":
          description: 支付参数

  /api/pay/demo-process:
    post:
      summary: 演示支付处理
      description: "模拟支付处理：更新订单状态为已支付，发放卡密，扣减库存"
      tags: [支付]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [orderId, paymentId]
              properties:
                orderId:
                  type: string
                  format: uuid
                paymentId:
                  type: string
                  format: uuid
      responses:
        "200":
          description: 支付成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  tokensCount:
                    type: integer
                    description: 发放的卡密数量

  /api/pay/wechat/notify:
    post:
      summary: 微信支付回调
      description: 微信支付异步通知接口（XML格式）
      tags: [支付]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                return_code:
                  type: string
                  enum: [SUCCESS, FAIL]
                result_code:
                  type: string
                  enum: [SUCCESS, FAIL]
                out_trade_no:
                  type: string
                transaction_id:
                  type: string
      responses:
        "200":
          description: 回调处理成功
          content:
            application/xml:
              schema:
                type: string
                example: "<xml><return_code>SUCCESS</return_code><return_msg>OK</return_msg></xml>"

  /api/pay/alipay/notify:
    post:
      summary: 支付宝支付回调
      description: 支付宝异步通知接口（form-data格式）
      tags: [支付]
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                trade_status:
                  type: string
                  enum: [TRADE_SUCCESS, TRADE_FINISHED, TRADE_CLOSED]
                out_trade_no:
                  type: string
                trade_no:
                  type: string
                total_amount:
                  type: string
      responses:
        "200":
          description: 回调处理成功

  # ============================================================
  # Coupon Routes
  # ============================================================
  /api/coupons/validate:
    post:
      summary: 验证优惠券
      description: 验证优惠码有效性并计算优惠金额
      tags: [优惠券]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [code, orderAmount]
              properties:
                code:
                  type: string
                  description: 优惠码
                orderAmount:
                  type: number
                  description: 订单金额
      responses:
        "200":
          description: 验证结果
          content:
            application/json:
              schema:
                type: object
                properties:
                  valid:
                    type: boolean
                  discount:
                    type: number
                    description: 优惠金额
                  message:
                    type: string
                  couponId:
                    type: string
                    description: 优惠券有效时返回ID
                  couponName:
                    type: string

  # ============================================================
  # Notification Routes
  # ============================================================
  /api/notifications:
    get:
      summary: 获取通知列表
      description: 获取当前用户的通知列表（需登录）
      tags: [通知]
      security:
        - NextAuthSession: []
      parameters:
        - name: unread
          in: query
          schema:
            type: string
            enum: ["true", "false"]
          description: 仅筛选未读通知
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: 通知列表
    put:
      summary: 标记通知已读
      description: 标记单条或全部通知为已读（需登录）
      tags: [通知]
      security:
        - NextAuthSession: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                id:
                  type: string
                  description: 通知ID（指定单条）
                markAll:
                  type: boolean
                  description: 标记全部为已读
      responses:
        "200":
          description: 操作成功

  # ============================================================
  # Promotion Routes
  # ============================================================
  /api/promotions:
    get:
      summary: 活跃促销活动
      description: 获取当前正在进行的促销活动列表
      tags: [促销活动]
      responses:
        "200":
          description: 促销活动列表
          content:
            application/json:
              schema:
                type: object
                properties:
                  promotions:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        name:
                          type: string
                        type:
                          type: string
                          enum: [SECKILL, GROUPBUY, FULL_REDUCE]
                        startAt:
                          type: string
                          format: date-time
                        endAt:
                          type: string
                          format: date-time
                        rules:
                          type: object
                        products:
                          type: array
                          items:
                            type: object

  # ============================================================
  # Review Routes
  # ============================================================
  /api/reviews:
    post:
      summary: 创建评价
      description: 对已购买的商品创建评价（需登录且已购买）
      tags: [评价]
      security:
        - NextAuthSession: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [productId, rating, content]
              properties:
                productId:
                  type: string
                  format: uuid
                rating:
                  type: integer
                  minimum: 1
                  maximum: 5
                content:
                  type: string
                  minLength: 1
                  maxLength: 1000
      responses:
        "201":
          description: 创建成功
        "401":
          description: 未登录
        "403":
          description: 未购买该商品
        "409":
          description: 已评价过该商品

  # ============================================================
  # Admin Routes
  # ============================================================
  /api/admin/login:
    post:
      summary: 管理员登录
      description: 管理员账号密码登录，返回 admin_session cookie
      tags: [管理后台-认证]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username, password]
              properties:
                username:
                  type: string
                password:
                  type: string
      responses:
        "200":
          description: 登录成功
          headers:
            Set-Cookie:
              schema:
                type: string
                description: admin_session cookie

  /api/admin/stats:
    get:
      summary: 管理后台概览统计
      description: 获取管理后台首页的统计数据
      tags: [管理后台-统计]
      parameters:
        - name: type
          in: query
          schema:
            type: string
            enum: [overview, topProducts, recentOrders]
            default: overview
      responses:
        "200":
          description: 统计数据

  /api/admin/analytics:
    get:
      summary: 数据分析
      description: 获取营收趋势、分类分布、订单状态分布等分析数据
      tags: [管理后台-统计]
      parameters:
        - name: days
          in: query
          schema:
            type: integer
            default: 30
          description: 统计天数
        - name: type
          in: query
          schema:
            type: string
            enum: [all, revenue, categories, status, summary]
            default: all
      responses:
        "200":
          description: 分析数据

  /api/admin/notifications:
    get:
      summary: 管理员通知列表
      description: 获取所有未读通知（管理员监控用）
      tags: [管理后台-通知]
      responses:
        "200":
          description: 通知列表

  # ----- Admin Products -----
  /api/admin/products:
    get:
      summary: 管理后台商品列表
      description: 获取所有商品（含下架，管理后台用）
      tags: [管理后台-商品]
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: status
          in: query
          schema:
            type: string
            enum: [DRAFT, ONLINE, OFFLINE]
      responses:
        "200":
          description: 商品列表
    post:
      summary: 管理后台创建商品
      description: 创建商品（管理后台）
      tags: [管理后台-商品]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, originalPrice, sellingPrice]
              properties:
                name:
                  type: string
                slug:
                  type: string
                description:
                  type: string
                coverImage:
                  type: string
                images:
                  type: array
                  items:
                    type: string
                originalPrice:
                  type: number
                sellingPrice:
                  type: number
                costPrice:
                  type: number
                stock:
                  type: integer
                availableStock:
                  type: integer
                tokenType:
                  type: string
                  enum: [CHAT, EMBEDDING, IMAGE, VIDEO, API_KEY, ACCOUNT]
                tokenAmount:
                  type: integer
                validityDays:
                  type: integer
                status:
                  $ref: "#/components/schemas/ProductStatus"
                categoryId:
                  type: string
      responses:
        "201":
          description: 创建成功
    put:
      summary: 管理后台更新商品
      description: 更新商品信息
      tags: [管理后台-商品]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [id]
              properties:
                id:
                  type: string
                name:
                  type: string
                description:
                  type: string
                coverImage:
                  type: string
                sellingPrice:
                  type: number
                stock:
                  type: integer
                status:
                  $ref: "#/components/schemas/ProductStatus"
                categoryId:
                  type: string
      responses:
        "200":
          description: 更新成功
    delete:
      summary: 管理后台删除商品
      description: 删除商品
      tags: [管理后台-商品]
      parameters:
        - name: id
          in: query
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: 删除成功

  # ----- Admin Orders -----
  /api/admin/orders:
    get:
      summary: 管理后台订单列表
      description: 获取所有订单（含筛选）
      tags: [管理后台-订单]
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: status
          in: query
          schema:
            type: string
            enum: [PENDING, PAID, SHIPPED, COMPLETED, CANCELLED, REFUNDING, REFUNDED]
        - name: userId
          in: query
          schema:
            type: string
        - name: startDate
          in: query
          schema:
            type: string
            format: date
        - name: endDate
          in: query
          schema:
            type: string
            format: date
      responses:
        "200":
          description: 订单列表
    put:
      summary: 管理后台更新订单状态
      description: 更新订单状态（状态机校验）
      tags: [管理后台-订单]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [id, status]
              properties:
                id:
                  type: string
                  format: uuid
                status:
                  type: string
                  enum: [PENDING, PAID, SHIPPED, COMPLETED, CANCELLED, REFUNDING, REFUNDED]
      responses:
        "200":
          description: 更新成功
        "400":
          description: 状态变更无效

  /api/admin/orders/{id}:
    get:
      summary: 管理后台订单详情
      description: 获取订单详情（含商品、支付、卡密、用户信息）
      tags: [管理后台-订单]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: 订单详情
    put:
      summary: 管理后台更新订单状态(按ID)
      description: 通过订单ID更新订单状态
      tags: [管理后台-订单]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [status]
              properties:
                status:
                  type: string
                  enum: [PENDING, PAID, SHIPPED, COMPLETED, CANCELLED, REFUNDING, REFUNDED]
      responses:
        "200":
          description: 更新成功

  /api/admin/orders/expire:
    post:
      summary: 订单自动过期取消
      description: 查找所有已超时的待支付订单并自动取消（可用于 Cron Job）
      tags: [管理后台-订单]
      responses:
        "200":
          description: 处理结果
          content:
            application/json:
              schema:
                type: object
                properties:
                  cancelledCount:
                    type: integer
                  cancelledOrders:
                    type: array
                    items:
                      type: string

  # ----- Admin Users -----
  /api/admin/users:
    get:
      summary: 管理后台用户列表
      description: 获取用户列表（含搜索、筛选）
      tags: [管理后台-用户]
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: status
          in: query
          schema:
            type: string
        - name: memberLevel
          in: query
          schema:
            type: integer
        - name: search
          in: query
          schema:
            type: string
          description: 搜索昵称、手机号、邮箱
      responses:
        "200":
          description: 用户列表
    put:
      summary: 管理后台更新用户
      description: 更新用户状态或会员等级
      tags: [管理后台-用户]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [id]
              properties:
                id:
                  type: string
                  format: uuid
                status:
                  type: string
                  enum: [ACTIVE, DISABLED]
                memberLevel:
                  type: integer
      responses:
        "200":
          description: 更新成功

  # ----- Admin Tokens -----
  /api/admin/tokens:
    get:
      summary: 管理后台卡密列表
      description: 获取所有卡密（含筛选）
      tags: [管理后台-卡密]
      parameters:
        - name: productId
          in: query
          schema:
            type: string
            format: uuid
        - name: status
          in: query
          schema:
            type: string
            enum: [UNUSED, SOLD, EXPIRED]
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: pageSize
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: 卡密列表
    post:
      summary: 批量生成卡密
      description: 批量生成卡密并更新商品库存
      tags: [管理后台-卡密]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [productId, count]
              properties:
                productId:
                  type: string
                  format: uuid
                count:
                  type: integer
                  minimum: 1
                  maximum: 1000
                keyType:
                  type: string
                  enum: [API_KEY, ACCOUNT, PASSWORD, TOKEN]
                  default: API_KEY
                expireDays:
                  type: integer
                  minimum: 0
      responses:
        "200":
          description: 生成成功

  # ----- Admin Coupons -----
  /api/admin/coupons:
    get:
      summary: 管理后台优惠券列表
      description: 获取优惠券列表
      tags: [管理后台-营销]
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: status
          in: query
          schema:
            type: string
            enum: [ACTIVE, INACTIVE]
      responses:
        "200":
          description: 优惠券列表
    post:
      summary: 创建优惠券
      description: 创建新优惠券
      tags: [管理后台-营销]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, code, type, value, totalCount, startAt, endAt]
              properties:
                name:
                  type: string
                code:
                  type: string
                  maxLength: 50
                type:
                  type: string
                  enum: [FIXED, PERCENT]
                value:
                  type: number
                  description: "优惠金额(FIXED)或折扣百分比(PERCENT)"
                minAmount:
                  type: number
                  default: 0
                totalCount:
                  type: integer
                startAt:
                  type: string
                  format: date-time
                endAt:
                  type: string
                  format: date-time
      responses:
        "201":
          description: 创建成功
    put:
      summary: 更新优惠券
      description: 更新优惠券信息
      tags: [管理后台-营销]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [id]
              properties:
                id:
                  type: string
                  format: uuid
                name:
                  type: string
                code:
                  type: string
                type:
                  type: string
                  enum: [FIXED, PERCENT]
                value:
                  type: number
                minAmount:
                  type: number
                totalCount:
                  type: integer
                status:
                  type: string
                  enum: [ACTIVE, INACTIVE]
                startAt:
                  type: string
                  format: date-time
                endAt:
                  type: string
                  format: date-time
      responses:
        "200":
          description: 更新成功
    delete:
      summary: 删除优惠券
      description: 删除指定优惠券
      tags: [管理后台-营销]
      parameters:
        - name: id
          in: query
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: 删除成功

  # ----- Admin Promotions -----
  /api/admin/promotions:
    get:
      summary: 管理后台促销活动列表
      description: 获取促销活动列表
      tags: [管理后台-营销]
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: status
          in: query
          schema:
            type: string
            enum: [DRAFT, ACTIVE, EXPIRED]
        - name: type
          in: query
          schema:
            type: string
            enum: [SECKILL, GROUPBUY, FULL_REDUCE]
      responses:
        "200":
          description: 活动列表
    post:
      summary: 创建促销活动
      description: 创建新的促销活动（秒杀/团购/满减）
      tags: [管理后台-营销]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, type, startAt, endAt, rules, productIds]
              properties:
                name:
                  type: string
                type:
                  type: string
                  enum: [SECKILL, GROUPBUY, FULL_REDUCE]
                startAt:
                  type: string
                  format: date-time
                endAt:
                  type: string
                  format: date-time
                rules:
                  type: object
                  properties:
                    discountPercent:
                      type: integer
                    discountAmount:
                      type: number
                    minAmount:
                      type: number
                    groupSize:
                      type: integer
                    maxQuantity:
                      type: integer
                productIds:
                  type: array
                  minItems: 1
                  items:
                    type: string
                    format: uuid
      responses:
        "201":
          description: 创建成功
    put:
      summary: 更新促销活动
      description: 更新促销活动信息
      tags: [管理后台-营销]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [id]
              properties:
                id:
                  type: string
                  format: uuid
                name:
                  type: string
                type:
                  type: string
                  enum: [SECKILL, GROUPBUY, FULL_REDUCE]
                status:
                  type: string
                  enum: [DRAFT, ACTIVE, EXPIRED]
                startAt:
                  type: string
                  format: date-time
                endAt:
                  type: string
                  format: date-time
                rules:
                  type: object
                productIds:
                  type: array
                  items:
                    type: string
                    format: uuid
      responses:
        "200":
          description: 更新成功
    delete:
      summary: 删除促销活动
      description: 删除指定促销活动
      tags: [管理后台-营销]
      parameters:
        - name: id
          in: query
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: 删除成功

  # ----- Admin Roles -----
  /api/admin/roles:
    get:
      summary: 管理后台角色列表
      description: 获取所有角色（含管理员数量）
      tags: [管理后台-权限]
      responses:
        "200":
          description: 角色列表
    post:
      summary: 创建角色
      description: 创建新角色
      tags: [管理后台-权限]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, permissions]
              properties:
                name:
                  type: string
                description:
                  type: string
                permissions:
                  type: array
                  items:
                    type: string
                    enum:
                      - dashboard:view
                      - products:view
                      - products:create
                      - products:edit
                      - products:delete
                      - orders:view
                      - orders:edit
                      - users:view
                      - users:edit
                      - tokens:view
                      - tokens:create
                      - promotions:view
                      - promotions:create
                      - promotions:edit
                      - promotions:delete
                      - reviews:view
                      - reviews:delete
                      - settlements:view
                      - settlements:edit
                      - roles:view
                      - roles:create
                      - roles:edit
                      - roles:delete
                      - settings:view
                      - settings:edit
      responses:
        "201":
          description: 创建成功
    put:
      summary: 更新角色
      description: 更新角色信息
      tags: [管理后台-权限]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [id]
              properties:
                id:
                  type: string
                  format: uuid
                name:
                  type: string
                description:
                  type: string
                permissions:
                  type: array
                  items:
                    type: string
      responses:
        "200":
          description: 更新成功
    delete:
      summary: 删除角色
      description: 删除指定角色（有管理员的角色无法删除）
      tags: [管理后台-权限]
      parameters:
        - name: id
          in: query
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: 删除成功
        "400":
          description: 角色下有管理员无法删除

  # ----- Admin Reviews -----
  /api/admin/reviews:
    get:
      summary: 管理后台评价列表
      description: 获取所有评价
      tags: [管理后台-评价]
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: productId
          in: query
          schema:
            type: string
            format: uuid
