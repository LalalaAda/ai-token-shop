      description: 删除指定评价
      tags: [管理后台-评价]
      parameters:
        - name: id
          in: query
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: 删除成功

  # ----- Admin Settlements -----
  /api/admin/settlements:
    get:
      summary: 管理后台结算记录
      description: 获取结算分账记录列表
      tags: [管理后台-结算]
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: status
          in: query
          schema:
            type: string
            enum: [PENDING, PROCESSING, COMPLETED]
      responses:
        "200":
          description: 结算列表
    put:
      summary: 更新结算状态
      description: 更新结算记录状态
      tags: [管理后台-结算]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [id, status]
              properties:
                id:
                  type: string
                  format: uuid
                status:
                  type: string
                  enum: [PENDING, PROCESSING, COMPLETED]
      responses:
        "200":
          description: 更新成功

  # ----- Admin Inventory -----
  /api/admin/inventory:
    get:
      summary: 管理后台库存列表
      description: 获取卡密库存列表（含统计）
      tags: [管理后台-库存]
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: status
          in: query
          schema:
            type: string
            enum: [UNUSED, SOLD, EXPIRED]
        - name: productId
          in: query
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: 库存列表
    post:
      summary: 添加卡密
      description: 手动添加单条卡密到库存
      tags: [管理后台-库存]
