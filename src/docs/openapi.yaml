  - name: 支付
    description: 支付发起、回调处理
  - name: 优惠券
    description: 优惠券验证
  - name: 通知
    description: 用户通知
  - name: 促销活动
    description: 促销活动查询
  - name: 评价
    description: 商品评价
  - name: 管理后台-认证
    description: 管理员登录
  - name: 管理后台-统计
    description: 仪表盘、数据分析
  - name: 管理后台-通知
    description: 通知监控
  - name: 管理后台-商品
    description: 商品CRUD管理
  - name: 管理后台-订单
    description: 订单管理、状态流转
  - name: 管理后台-用户
    description: 用户管理
  - name: 管理后台-卡密
    description: 卡密生成、管理
  - name: 管理后台-营销
    description: 优惠券、促销活动管理
  - name: 管理后台-权限
