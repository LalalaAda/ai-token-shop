        required: true
        content:
          application/json:
            schema:
              type: object
              required: [productId, keyValue]
              properties:
                productId:
                  type: string
                  format: uuid
                keyValue:
                  type: string
                keyType:
                  type: string
                  default: API_KEY
                expireAt:
                  type: string
                  format: date-time
      responses:
        "201":
          description: 添加成功
    delete:
      summary: 删除卡密
      description: 删除指定卡密（已售出不可删除）
      tags: [管理后台-库存]
      parameters:
        - name: id
          in: query
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: 删除成功
        "400":
          description: 已售出不可删除

components:
  securitySchemes:
    NextAuthSession:
      type: apiKey
      in: cookie
      name: next-auth.session-token
      description: NextAuth JWT Session Cookie（浏览器自动携带）
    AdminSession:
      type: apiKey
      in: cookie
      name: admin_session
      description: 管理员 Session Cookie（通过 /api/admin/login 获取）

  schemas:
    Pagination:
      type: object
      properties:
        page:
          type: integer
        limit:
          type: integer
        total:
          type: integer
        totalPages:
          type: integer

    Product:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        slug:
          type: string
        description:
          type: string
          nullable: true
        coverImage:
          type: string
          nullable: true
        images:
          type: array
          items:
            type: string
        originalPrice:
          type: number
        sellingPrice:
          type: number
        costPrice:
          type: number
          nullable: true
        stock:
          type: integer
        availableStock:
          type: integer
        salesCount:
          type: integer
        tokenType:
          type: string
          nullable: true
          enum: [CHAT, EMBEDDING, IMAGE, VIDEO, API_KEY, ACCOUNT]
        tokenAmount:
          type: integer
          nullable: true
        validityDays:
          type: integer
          nullable: true
        status:
          $ref: "#/components/schemas/ProductStatus"
        categoryId:
          type: string
        category:
          type: object
          properties:
            id:
              type: string
            name:
              type: string

    ProductStatus:
      type: string
      enum: [DRAFT, ONLINE, OFFLINE]

    ApiResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          type: object
        error:
          type: string
        message:
          type: string

